<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Airimg — Drag, compress, and upload images to your Google Drive. Get a permanent, fast, embeddable hotlink instantly." />
  <title>Airimg — Instant Image Hotlinks</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-brand">
        <svg class="header-logo" viewBox="0 0 32 32" width="32" height="32" fill="none">
          <defs>
            <linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
          <rect width="32" height="32" rx="8" fill="url(#logo-grad)"/>
          <path d="M8 22l5-7 4 5 3-4 4 6H8z" fill="rgba(255,255,255,0.9)"/>
          <circle cx="21" cy="12" r="2.5" fill="rgba(255,255,255,0.85)"/>
        </svg>
        <h1 class="header-title">Airimg</h1>
      </div>
      <nav class="header-nav">
        <button id="auth-btn" class="btn btn-auth">Sign in with Google</button>
      </nav>
    </header>

    <main class="main">
      <section id="hero" class="hero">
        <h2 class="hero-title">Instant image hotlinks.<br/><span class="hero-accent">Powered by your Drive.</span></h2>
        <p class="hero-subtitle">Drag an image in, get a permanent embeddable link back. Compressed to WebP, stripped of metadata, stored in your own Google Drive.</p>
      </section>

      <section id="workspace" class="workspace">
        <!-- Dropzone, progress, and result panels injected here by JS -->
      </section>

      <section id="error-banner" class="error-banner" hidden>
        <p id="error-message" class="error-message"></p>
        <button id="error-dismiss" class="btn btn-ghost">Dismiss</button>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Airimg &middot; Your images, your Drive, your links.</p>
    </footer>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
